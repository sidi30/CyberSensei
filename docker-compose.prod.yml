# =============================================================================
# CyberSensei - Docker Compose PRODUCTION
# =============================================================================
# Utilise le Traefik de Coolify pour le routage + TLS automatique (Let's Encrypt).
# AUCUN port exposé sur l'hôte = zéro conflit.
#
# DÉPLOIEMENT :
#   docker compose -f docker-compose.prod.yml up -d                # Core services
#   docker compose -f docker-compose.prod.yml --profile ai up -d   # + AI Security (8GB RAM)
#   docker compose -f docker-compose.prod.yml --profile monitoring up -d  # + Grafana/Prometheus
#   docker compose -f docker-compose.prod.yml --profile all up -d  # Tout
#
# PRÉREQUIS DNS (A records → IP du serveur) :
#   cybersensei.gwan.fr       → Website
#   app.cybersensei.gwan.fr   → Central Dashboard
#   node.cybersensei.gwan.fr  → Node Dashboard
#   m365.cybersensei.gwan.fr  → M365 Dashboard
#   api.cybersensei.gwan.fr   → Central Backend API (direct)
#   monitoring.cybersensei.gwan.fr → Grafana
# =============================================================================

x-common-labels: &https-redirect
  - "traefik.http.middlewares.cs-https-redirect.redirectscheme.scheme=https"
  - "traefik.http.middlewares.cs-https-redirect.redirectscheme.permanent=true"

services:
  # ===========================================================================
  # DATABASE (interne uniquement, pas de port exposé)
  # ===========================================================================

  postgres:
    image: postgres:15-alpine
    container_name: cs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: Europe/Paris
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cs-internal
    deploy:
      resources:
        limits:
          memory: 512M

  mongo:
    image: mongo:6-jammy
    container_name: cs-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    volumes:
      - mongo-data:/data/db
    networks:
      - cs-internal
    deploy:
      resources:
        limits:
          memory: 512M

  # ===========================================================================
  # NODE - On-Premise Stack
  # ===========================================================================

  node-backend:
    build:
      context: ./cybersensei-node/backend
      dockerfile: Dockerfile
    container_name: cs-node-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://cs-postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      AI_SERVICE_URL: http://ai-security-ai:8000
      JWT_SECRET: ${JWT_SECRET}
      SECURITY_BYPASS: "false"
      DEV_MODE: "false"
      CORS_ORIGINS: https://node.${DOMAIN},https://app.${DOMAIN},https://${DOMAIN},https://tabs.${DOMAIN}
      SERVER_PORT: 8080
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - cs-internal
    deploy:
      resources:
        limits:
          memory: 2G

  node-dashboard:
    build:
      context: ./cybersensei-node/dashboard
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_BYPASS_AUTH: "false"
    container_name: cs-node-dashboard
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      # HTTPS
      - "traefik.http.routers.cs-node.rule=Host(`node.${DOMAIN}`)"
      - "traefik.http.routers.cs-node.entrypoints=https"
      - "traefik.http.routers.cs-node.tls=true"
      - "traefik.http.routers.cs-node.tls.certresolver=letsencrypt"
      - "traefik.http.services.cs-node.loadbalancer.server.port=80"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.cs-node-http.rule=Host(`node.${DOMAIN}`)"
      - "traefik.http.routers.cs-node-http.entrypoints=http"
      - "traefik.http.routers.cs-node-http.middlewares=cs-https-redirect"
    networks:
      - cs-internal
      - coolify
    deploy:
      resources:
        limits:
          memory: 128M

  # ===========================================================================
  # CENTRAL - SaaS Stack
  # ===========================================================================

  central-backend:
    build:
      context: ./cybersensei-central/backend
      dockerfile: Dockerfile
    container_name: cs-central-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      POSTGRES_HOST: cs-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${CENTRAL_POSTGRES_DB}
      MONGODB_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@cs-mongo:27017/${MONGO_DATABASE}?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-24h}
      M365_CLIENT_ID: ${M365_CLIENT_ID:-}
      M365_CLIENT_SECRET: ${M365_CLIENT_SECRET:-}
      M365_REDIRECT_URI: https://m365.${DOMAIN}/m365/auth/callback
      M365_TOKEN_ENCRYPTION_KEY: ${M365_TOKEN_ENCRYPTION_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_KEY_ENCRYPTION_SECRET: ${AI_KEY_ENCRYPTION_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@cybersensei.io}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_STARTER_PRICE_ID: ${STRIPE_STARTER_PRICE_ID:-}
      STRIPE_BUSINESS_PRICE_ID: ${STRIPE_BUSINESS_PRICE_ID:-}
      CORS_ORIGINS: https://app.${DOMAIN},https://m365.${DOMAIN},https://${DOMAIN},https://tabs.${DOMAIN}
      PUBLIC_BACKEND_URL: https://api.${DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      # HTTPS - API direct access
      - "traefik.http.routers.cs-api.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.cs-api.entrypoints=https"
      - "traefik.http.routers.cs-api.tls=true"
      - "traefik.http.routers.cs-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.cs-api.loadbalancer.server.port=3000"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.cs-api-http.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.cs-api-http.entrypoints=http"
      - "traefik.http.routers.cs-api-http.middlewares=cs-https-redirect"
    networks:
      - cs-internal
      - coolify
    deploy:
      resources:
        limits:
          memory: 1G

  central-dashboard:
    build:
      context: ./cybersensei-central/dashboard
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: cs-central-dashboard
    restart: unless-stopped
    depends_on:
      - central-backend
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      # HTTPS
      - "traefik.http.routers.cs-app.rule=Host(`app.${DOMAIN}`)"
      - "traefik.http.routers.cs-app.entrypoints=https"
      - "traefik.http.routers.cs-app.tls=true"
      - "traefik.http.routers.cs-app.tls.certresolver=letsencrypt"
      - "traefik.http.services.cs-app.loadbalancer.server.port=80"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.cs-app-http.rule=Host(`app.${DOMAIN}`)"
      - "traefik.http.routers.cs-app-http.entrypoints=http"
      - "traefik.http.routers.cs-app-http.middlewares=cs-https-redirect"
    networks:
      - cs-internal
      - coolify
    deploy:
      resources:
        limits:
          memory: 128M

  m365-dashboard:
    build:
      context: ./cybersensei-central/m365-dashboard
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: cs-m365-dashboard
    restart: unless-stopped
    depends_on:
      - central-backend
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      # HTTPS
      - "traefik.http.routers.cs-m365.rule=Host(`m365.${DOMAIN}`)"
      - "traefik.http.routers.cs-m365.entrypoints=https"
      - "traefik.http.routers.cs-m365.tls=true"
      - "traefik.http.routers.cs-m365.tls.certresolver=letsencrypt"
      - "traefik.http.services.cs-m365.loadbalancer.server.port=80"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.cs-m365-http.rule=Host(`m365.${DOMAIN}`)"
      - "traefik.http.routers.cs-m365-http.entrypoints=http"
      - "traefik.http.routers.cs-m365-http.middlewares=cs-https-redirect"
    networks:
      - cs-internal
      - coolify
    deploy:
      resources:
        limits:
          memory: 128M

  # ===========================================================================
  # WEBSITE
  # ===========================================================================

  website:
    build:
      context: ./cybersensei-website
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_DOMAIN: ${DOMAIN}
    container_name: cs-website
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      # Middleware definition (used by all CS services)
      - "traefik.http.middlewares.cs-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.cs-https-redirect.redirectscheme.permanent=true"
      # HTTPS
      - "traefik.http.routers.cs-website.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.cs-website.entrypoints=https"
      - "traefik.http.routers.cs-website.tls=true"
      - "traefik.http.routers.cs-website.tls.certresolver=letsencrypt"
      - "traefik.http.services.cs-website.loadbalancer.server.port=3000"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.cs-website-http.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.cs-website-http.entrypoints=http"
      - "traefik.http.routers.cs-website-http.middlewares=cs-https-redirect"
    networks:
      - cs-internal
      - coolify
    deploy:
      resources:
        limits:
          memory: 512M

  # ===========================================================================
  # TEAMS (optionnel)
  # ===========================================================================

  teams-bot:
    build:
      context: ./cybersensei-teams-app/bot
      dockerfile: Dockerfile
    container_name: cs-teams-bot
    restart: unless-stopped
    profiles:
      - teams
      - all
    environment:
      BOT_ID: ${TEAMS_BOT_ID:-}
      BOT_PASSWORD: ${TEAMS_BOT_PASSWORD:-}
      MICROSOFT_APP_ID: ${TEAMS_APP_ID:-}
      MICROSOFT_APP_PASSWORD: ${TEAMS_APP_PASSWORD:-}
      MICROSOFT_APP_TENANT_ID: ${TEAMS_APP_TENANT_ID:-}
      BACKEND_URL: http://cs-node-backend:8080
      BACKEND_BASE_URL: http://cs-node-backend:8080
      PORT: 5175
      NODE_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:5175/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - cs-internal
    deploy:
      resources:
        limits:
          memory: 512M

  teams-tabs:
    build:
      context: ./cybersensei-teams-app/tabs
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: https://node.${DOMAIN}
    container_name: cs-teams-tabs
    restart: unless-stopped
    profiles:
      - teams
      - all
    depends_on:
      - node-backend
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:80/tabs/employee/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      # HTTPS
      - "traefik.http.routers.cs-tabs.rule=Host(`tabs.${DOMAIN}`)"
      - "traefik.http.routers.cs-tabs.entrypoints=https"
      - "traefik.http.routers.cs-tabs.tls=true"
      - "traefik.http.routers.cs-tabs.tls.certresolver=letsencrypt"
      - "traefik.http.services.cs-tabs.loadbalancer.server.port=80"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.cs-tabs-http.rule=Host(`tabs.${DOMAIN}`)"
      - "traefik.http.routers.cs-tabs-http.entrypoints=http"
      - "traefik.http.routers.cs-tabs-http.middlewares=cs-https-redirect"
    networks:
      - cs-internal
      - coolify
    deploy:
      resources:
        limits:
          memory: 128M

  # ===========================================================================
  # AI SECURITY (optionnel - nécessite ~8GB RAM)
  # ===========================================================================

  ai-security-ai:
    build:
      context: ./cybersensei-ai-security/ai
      dockerfile: Dockerfile
    container_name: cs-ai-security-ai
    restart: unless-stopped
    profiles:
      - ai
      - all
    environment:
      MODEL_PATH: /app/models/mistral-7b-instruct.Q4_K_M.gguf
      LLAMA_HOST: 0.0.0.0
      LLAMA_PORT: 8001
      API_PORT: 8000
      SEMANTIC_THRESHOLD: ${SEMANTIC_THRESHOLD:-40}
      PYTHONUNBUFFERED: 1
    volumes:
      - ai-models:/app/models
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 180s
    networks:
      - cs-internal
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G

  ai-security-backend:
    build:
      context: ./cybersensei-ai-security/backend
      dockerfile: Dockerfile
    container_name: cs-ai-security-backend
    restart: unless-stopped
    profiles:
      - ai
      - all
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_HOST: cs-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      AI_SECURITY_DB: ${AI_SECURITY_DB}
      AI_SECURITY_SERVICE_URL: http://ai-security-ai:8000
      JWT_SECRET: ${JWT_SECRET}
      SECURITY_BYPASS: "false"
      CORS_ORIGINS: https://node.${DOMAIN},https://app.${DOMAIN},https://${DOMAIN}
      NODE_BACKEND_URL: http://node-backend:8080
      SERVER_PORT: 8081
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
    depends_on:
      postgres:
        condition: service_healthy
      ai-security-ai:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8081/api/ai-security/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - cs-internal
    deploy:
      resources:
        limits:
          memory: 1G

  # ===========================================================================
  # MONITORING (optionnel)
  # ===========================================================================

  prometheus:
    image: prom/prometheus:latest
    container_name: cs-prometheus
    restart: unless-stopped
    profiles:
      - monitoring
      - all
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    volumes:
      - prometheus-data:/prometheus
      - ./cybersensei-central/infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - cs-internal
    deploy:
      resources:
        limits:
          memory: 512M

  grafana:
    image: grafana/grafana:latest
    container_name: cs-grafana
    restart: unless-stopped
    profiles:
      - monitoring
      - all
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://monitoring.${DOMAIN}
    volumes:
      - grafana-data:/var/lib/grafana
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      # HTTPS
      - "traefik.http.routers.cs-grafana.rule=Host(`monitoring.${DOMAIN}`)"
      - "traefik.http.routers.cs-grafana.entrypoints=https"
      - "traefik.http.routers.cs-grafana.tls=true"
      - "traefik.http.routers.cs-grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.cs-grafana.loadbalancer.server.port=3000"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.cs-grafana-http.rule=Host(`monitoring.${DOMAIN}`)"
      - "traefik.http.routers.cs-grafana-http.entrypoints=http"
      - "traefik.http.routers.cs-grafana-http.middlewares=cs-https-redirect"
    networks:
      - cs-internal
      - coolify
    deploy:
      resources:
        limits:
          memory: 256M

# ===========================================================================
# NETWORKS
# ===========================================================================

networks:
  cs-internal:
    driver: bridge
    name: cs-internal
  coolify:
    external: true
    name: coolify

# ===========================================================================
# VOLUMES
# ===========================================================================

volumes:
  postgres-data:
    name: cs-postgres-data
  mongo-data:
    name: cs-mongo-data
  ai-models:
    name: cs-ai-models
  prometheus-data:
    name: cs-prometheus-data
  grafana-data:
    name: cs-grafana-data
