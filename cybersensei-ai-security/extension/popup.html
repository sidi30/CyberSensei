<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .logo {
      font-size: 15px;
      font-weight: 700;
      color: #00d4aa;
    }

    .version {
      font-size: 11px;
      color: #6b7280;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      background: rgba(0, 212, 170, 0.06);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .status-bar.disabled {
      background: rgba(239, 68, 68, 0.06);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00d4aa;
    }

    .status-bar.disabled .status-dot {
      background: #ef4444;
    }

    .status-text {
      font-size: 12px;
      color: #9ca3af;
    }

    .section {
      padding: 16px 20px;
    }

    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6b7280;
      margin-bottom: 12px;
    }

    .field {
      margin-bottom: 12px;
    }

    .field label {
      display: block;
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 4px;
    }

    .field input {
      width: 100%;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
    }

    .field input:focus {
      border-color: #00d4aa;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }

    .toggle-label {
      font-size: 13px;
    }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.15);
      border-radius: 22px;
      cursor: pointer;
      transition: 0.2s;
    }

    .toggle-slider::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.2s;
    }

    .toggle input:checked + .toggle-slider {
      background: #00d4aa;
    }

    .toggle input:checked + .toggle-slider::before {
      transform: translateX(18px);
    }

    .save-btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #00d4aa;
      color: #0a0a1a;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: 0.15s;
    }

    .save-btn:hover {
      background: #00e6b8;
    }

    .save-msg {
      font-size: 12px;
      color: #00d4aa;
      text-align: center;
      margin-top: 8px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .save-msg.visible {
      opacity: 1;
    }

    .training-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #00d4aa 0%, #00a388 100%);
      color: #0a0a1a;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .training-btn:hover {
      background: linear-gradient(135deg, #00e6b8 0%, #00b89a 100%);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(0, 212, 170, 0.25);
    }

    .training-icon {
      font-size: 16px;
    }

    .sites-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }

    .site-tag {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 6px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: #9ca3af;
    }
  </style>
</head>
<body>

  <div class="header">
    <span class="logo">CyberSensei</span>
    <span class="version">v1.0.0</span>
  </div>

  <div class="status-bar" id="statusBar">
    <span class="status-dot"></span>
    <span class="status-text" id="statusText">Protection active</span>
  </div>

  <div class="section" style="padding-bottom:8px">
    <button class="training-btn" id="trainingBtn">
      <span class="training-icon">&#x1F393;</span>
      Formation Cybersecurite
    </button>
  </div>

  <div class="section">
    <div class="section-title">Configuration</div>

    <div class="field">
      <label for="apiUrl">URL serveur DLP (Protection)</label>
      <input type="text" id="apiUrl" placeholder="https://cs-dlp.gwani.fr">
    </div>

    <div class="field">
      <label for="trainingApiUrl">URL serveur Formation</label>
      <input type="text" id="trainingApiUrl" placeholder="https://cs-api.gwani.fr">
    </div>

    <div class="field">
      <label for="companyId">ID Entreprise</label>
      <input type="number" id="companyId" placeholder="1">
    </div>

    <div class="field">
      <label for="userId">ID Utilisateur</label>
      <input type="number" id="userId" placeholder="1">
    </div>

    <div class="toggle-row">
      <span class="toggle-label">Protection active</span>
      <label class="toggle">
        <input type="checkbox" id="enabled" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>

    <button class="save-btn" id="saveBtn">Sauvegarder</button>
    <div class="save-msg" id="saveMsg">Configuration sauvegardee</div>
  </div>

  <div class="section">
    <div class="section-title">Sites surveilles</div>
    <div class="sites-list">
      <span class="site-tag">ChatGPT</span>
      <span class="site-tag">Gemini</span>
      <span class="site-tag">Copilot</span>
      <span class="site-tag">Claude</span>
      <span class="site-tag">Mistral</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
