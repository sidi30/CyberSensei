<!DOCTYPE html>
<html>
<head><title>CyberSensei Icon Generator</title></head>
<body>
<p>Ouvrir cette page dans un navigateur et cliquer sur chaque bouton pour telecharger les icones.</p>
<canvas id="c" style="display:none"></canvas>
<button onclick="generate(16)">16x16</button>
<button onclick="generate(48)">48x48</button>
<button onclick="generate(128)">128x128</button>
<script>
function generate(size) {
  const c = document.getElementById('c');
  c.width = size;
  c.height = size;
  const ctx = c.getContext('2d');

  // Background circle
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.arc(size/2, size/2, size/2, 0, Math.PI * 2);
  ctx.fill();

  // Shield shape
  const cx = size/2, cy = size/2;
  const s = size * 0.35;
  ctx.fillStyle = '#00d4aa';
  ctx.beginPath();
  ctx.moveTo(cx, cy - s);
  ctx.lineTo(cx + s * 0.8, cy - s * 0.5);
  ctx.lineTo(cx + s * 0.8, cy + s * 0.2);
  ctx.quadraticCurveTo(cx, cy + s * 1.1, cx, cy + s * 1.1);
  ctx.quadraticCurveTo(cx, cy + s * 1.1, cx - s * 0.8, cy + s * 0.2);
  ctx.lineTo(cx - s * 0.8, cy - s * 0.5);
  ctx.closePath();
  ctx.fill();

  // Download
  const a = document.createElement('a');
  a.download = 'icon' + size + '.png';
  a.href = c.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
