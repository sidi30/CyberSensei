spring:
  application:
    name: cybersensei-ai-security

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${AI_SECURITY_DB:cybersensei_ai_security}
    username: ${POSTGRES_USER:cybersensei}
    password: ${POSTGRES_PASSWORD:cybersensei}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

ai-security:
  security:
    bypass: ${SECURITY_BYPASS:false}
    cors:
      allowed-origins: ${CORS_ORIGINS:http://localhost:3005}
    jwt:
      secret: ${JWT_SECRET:change-me-in-production-min-32-chars}
      expiration: 86400000

  # Prompt analysis configuration
  analyzer:
    max-prompt-length: 50000
    risk-threshold-warn: 40
    risk-threshold-block: 80

  # AI Security Service (Python FastAPI: LLM Guard + Mistral)
  ai-service:
    url: ${AI_SECURITY_SERVICE_URL:http://localhost:8000}
    timeout: ${AI_SECURITY_SERVICE_TIMEOUT:30000}

  # Inter-service communication
  node-backend-url: ${NODE_BACKEND_URL:http://localhost:8080}

server:
  port: ${SERVER_PORT:8081}
  error:
    include-message: always
  compression:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
