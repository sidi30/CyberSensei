# CyberSensei Agent — On-Premise Client Deployment
# Usage: docker compose -f docker/docker-compose.agent.yml up -d

version: '3.8'

services:
  # ============================================
  # DATABASE
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: cs-agent-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cybersensei_db}
      POSTGRES_USER: ${POSTGRES_USER:-cybersensei}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - agent-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cybersensei}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # ============================================
  # AGENT API (Spring Boot)
  # ============================================
  agent-api:
    build:
      context: ../agent/backend
      dockerfile: Dockerfile
    container_name: cs-agent-api
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-cybersensei_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-cybersensei}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
      AI_SERVICE_URL: http://ai-service:8000
      PLATFORM_API_URL: ${PLATFORM_API_URL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    ports:
      - "${AGENT_API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

  # ============================================
  # AGENT DASHBOARD (React)
  # ============================================
  agent-dashboard:
    build:
      context: ../agent/dashboard
      dockerfile: Dockerfile
    container_name: cs-agent-dashboard
    environment:
      VITE_API_URL: ${AGENT_API_URL:-http://localhost:8080}
    ports:
      - "${AGENT_DASHBOARD_PORT:-3005}:80"
    depends_on:
      agent-api:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  # ============================================
  # AI SERVICE (Mistral 7B + Presidio + LLM Guard)
  # ============================================
  ai-service:
    build:
      context: ../agent/ai
      dockerfile: Dockerfile
    container_name: cs-agent-ai
    environment:
      API_PORT: 8000
      SEMANTIC_THRESHOLD: ${SEMANTIC_THRESHOLD:-30}
      MODEL_PATH: ${MODEL_PATH:-/models/mistral-7b-instruct-v0.3.Q4_K_M.gguf}
    volumes:
      - ai-models:/models
    ports:
      - "${AI_SERVICE_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 180s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G

volumes:
  agent-postgres-data:
  ai-models:
